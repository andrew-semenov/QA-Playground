<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake Game | QA Playground</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      background: #0f1f0f;
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    h1 {
      color: #4ade80;
      margin-bottom: 20px;
    }

    #gameCanvas {
      border: 2px solid #4ade80;
      background: #021a02;
    }

    .score {
      font-size: 1.5rem;
      margin: 20px 0;
      color: #86efac;
    }

    .controls {
      margin-top: 20px;
      color: #64748b;
      font-size: 14px;
    }

    .back-link {
      position: fixed;
      top: 20px;
      left: 20px;
      color: #4ade80;
      text-decoration: none;
      padding: 10px 20px;
      background: #021a02;
      border: 1px solid #1e3a1e;
      border-radius: 8px;
    }

    .back-link:hover {
      background: #4ade80;
      color: #021a02;
    }
  </style>
</head>
<body>

  <a class="back-link" href="../../index.html">← Back to QA Playground</a>

  <h1>🐍 Snake Game</h1>
  <canvas id="gameCanvas" width="400" height="400"></canvas>
  <div class="score">Score: <span id="score">0</span></div>
  <div class="controls">Use Arrow Keys or WASD to move</div>

  <script src="App.js"></script>
</body>
</html>
