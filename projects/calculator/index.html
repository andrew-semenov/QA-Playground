<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator | QA Playground</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    h1 {
      color: #fbbf24;
      margin-bottom: 20px;
    }

    .calculator {
      background: #1e293b;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
    }

    #display {
      width: 100%;
      height: 60px;
      background: #0f172a;
      border: none;
      border-radius: 8px;
      color: #fbbf24;
      font-size: 2rem;
      text-align: right;
      padding: 10px;
      margin-bottom: 20px;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    button {
      padding: 20px;
      font-size: 1.25rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: bold;
    }

    button:hover {
      transform: scale(1.05);
    }

    button:active {
      transform: scale(0.95);
    }

    .btn-number {
      background: #334155;
      color: white;
    }

    .btn-number:hover {
      background: #475569;
    }

    .btn-operator {
      background: #fbbf24;
      color: #1e293b;
    }

    .btn-operator:hover {
      background: #f59e0b;
    }

    .btn-equals {
      background: #10b981;
      color: white;
      grid-column: span 2;
    }

    .btn-equals:hover {
      background: #059669;
    }

    .btn-clear {
      background: #ef4444;
      color: white;
      grid-column: span 2;
    }

    .btn-clear:hover {
      background: #dc2626;
    }

    .back-link {
      position: fixed;
      top: 20px;
      left: 20px;
      color: #fbbf24;
      text-decoration: none;
      padding: 10px 20px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
    }

    .back-link:hover {
      background: #fbbf24;
      color: #1e293b;
    }

    .warning {
      margin-top: 20px;
      color: #ef4444;
      font-size: 14px;
      text-align: center;
    }
  </style>
</head>
<body>

  <a class="back-link" href="../../index.html">← Back to QA Playground</a>

  <h1>🧮 Calculator</h1>
  <div class="calculator">
    <input type="text" id="display" readonly />
    <div class="buttons">
      <button class="btn-clear" data-action="clear">C</button>
      <button class="btn-operator" data-action="delete">←</button>
      <button class="btn-operator" data-action="negate">±</button>
      <button class="btn-operator" data-action="operator" data-value="/">÷</button>
      
      <button class="btn-number" data-action="number" data-value="7">7</button>
      <button class="btn-number" data-action="number" data-value="8">8</button>
      <button class="btn-number" data-action="number" data-value="9">9</button>
      <button class="btn-operator" data-action="operator" data-value="*">×</button>
      
      <button class="btn-number" data-action="number" data-value="4">4</button>
      <button class="btn-number" data-action="number" data-value="5">5</button>
      <button class="btn-number" data-action="number" data-value="6">6</button>
      <button class="btn-operator" data-action="operator" data-value="-">−</button>
      
      <button class="btn-number" data-action="number" data-value="1">1</button>
      <button class="btn-number" data-action="number" data-value="2">2</button>
      <button class="btn-number" data-action="number" data-value="3">3</button>
      <button class="btn-operator" data-action="operator" data-value="+">+</button>
      
      <button class="btn-number" data-action="number" data-value="0">0</button>
      <button class="btn-number" data-action="decimal">.</button>
      <button class="btn-equals" data-action="equals">=</button>
    </div>
  </div>
  <p class="warning" data-i18n="calcWarning">⚠️ This calculator has some interesting bugs...</p>

  <script src="../../translations.js"></script>
  <script src="App.js"></script>
</body>
</html>
