<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To-Do List</title>
  <link rel="stylesheet" href="../../styles.css">
  <style>
    .todo-container {
      max-width: 600px;
      margin: 0 auto;
      padding: 2rem;
    }
    .todo-input-group {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }
    .todo-input-group input {
      flex: 1;
      padding: 0.75rem;
      border: 2px solid var(--border-color);
      border-radius: 8px;
      font-size: 1rem;
      background: var(--bg-secondary);
      color: var(--text-color);
    }
    .todo-input-group input:focus {
      outline: none;
      border-color: var(--accent-color);
    }
    .add-btn {
      padding: 0.75rem 1.5rem;
      background: var(--accent-color);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: opacity 0.2s;
    }
    .add-btn:hover {
      opacity: 0.8;
    }
    .todo-list {
      list-style: none;
      padding: 0;
    }
    .todo-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 1rem;
      background: var(--bg-secondary);
      border-radius: 8px;
      margin-bottom: 0.5rem;
      border: 1px solid var(--border-color);
    }
    .todo-item.completed {
      opacity: 0.6;
    }
    .todo-item.completed .todo-text {
      text-decoration: line-through;
    }
    .todo-checkbox {
      width: 20px;
      height: 20px;
      cursor: pointer;
    }
    .todo-text {
      flex: 1;
      font-size: 1rem;
    }
    .delete-btn {
      padding: 0.5rem;
      background: transparent;
      border: none;
      color: #e74c3c;
      cursor: pointer;
      font-size: 1.25rem;
      opacity: 0.7;
      transition: opacity 0.2s;
    }
    .delete-btn:hover {
      opacity: 1;
    }
    .todo-stats {
      display: flex;
      justify-content: space-between;
      margin-top: 1rem;
      padding: 1rem;
      background: var(--bg-secondary);
      border-radius: 8px;
      font-size: 0.875rem;
      color: var(--text-secondary);
    }
  </style>
</head>
<body>
  <a href="../../index.html" class="back-link">← Back to Projects</a>
  
  <div class="todo-container">
    <h1>To-Do List</h1>
    <p class="project-desc">Manage your tasks efficiently</p>
    
    <div class="todo-input-group">
      <input type="text" id="todoInput" data-i18n-placeholder="todoPlaceholder">
      <button class="add-btn" id="addBtn" data-i18n="todoAdd">Add</button>
    </div>
    
    <ul class="todo-list" id="todoList"></ul>
    
    <div class="todo-stats">
      <span id="pendingCount">0 tasks pending</span>
      <span id="completedCount">0 completed</span>
    </div>
  </div>

  <script src="../../translations.js"></script>
  <script src="App.js"></script>
</body>
</html>
